<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BiroA Word dodatak</title>
  <link rel="stylesheet" href="taskpane-client.css" />
</head>

<body>
  <div class="shell">

    <!-- Status bar -->
    <div id="status" class="status" style="display:none;"></div>

    <!-- Tab buttons - klijent verzija -->
    <div class="tabs">
      <button id="btnFill" class="tab-btn">POPUNI</button>
      <button id="btnClear" class="tab-btn">PRIKAŽI POLJA</button>
      <button id="btnTemplates" class="tab-btn">TEMPLEJTI</button>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Table header - bez drag handle i akcija -->
      <div class="table-header client-header">
        <div class="th">POLJE</div>
        <div class="th">VREDNOST</div>
      </div>

      <!-- Rows container -->
      <div id="rows" class="table-body"></div>

      <div class="help">
        <strong>POPUNI:</strong> upiši vrednosti u tabelu i klikni POPUNI — polja u dokumentu će biti popunjena.<br>
        <strong>PRIKAŽI POLJA:</strong> vraća polja u vidljivi {PLACEHOLDER} oblik — korisno za pregled i proveru.<br>
        <strong>TEMPLEJTI:</strong> otvori novi dokument iz šablona.
      </div>

    </div>

  </div>

  <!-- Scripts -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="taskpane-client.js"></script>

</body>
</html>
